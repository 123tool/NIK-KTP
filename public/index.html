<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIK KTP OSINT</title>
    <style>
        :root { --bg: #FFDE00; --main: #FFFFFF; --accent: #000000; }
        body { background: var(--bg); font-family: sans-serif; padding: 20px; color: var(--accent); }
        .container { max-width: 700px; margin: 0 auto; }
        header { 
            background: var(--main); border: 4px solid var(--accent); 
            padding: 20px; margin-bottom: 20px; box-shadow: 10px 10px 0px var(--accent);
        }
        .card { 
            background: var(--main); border: 4px solid var(--accent); 
            padding: 20px; margin-bottom: 20px; box-shadow: 8px 8px 0px var(--accent);
        }
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        input { 
            flex: 1; padding: 15px; border: 4px solid var(--accent); 
            font-weight: bold; font-size: 1rem; outline: none;
        }
        button { 
            padding: 15px 25px; background: #2ed573; border: 4px solid var(--accent); 
            font-weight: bold; cursor: pointer; box-shadow: 4px 4px 0px var(--accent);
        }
        button:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px; }
        .btn-batch { background: #1e90ff; width: 100%; margin-top: 10px; }
        #result { 
            background: #f1f2f6; border: 2px dashed var(--accent); 
            padding: 15px; min-height: 50px; font-family: monospace;
        }
        .box { border-left: 8px solid #000; padding-left: 15px; margin: 10px 0; }
        .success { border-color: #2ed573; }
        .info { border-color: #1e90ff; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 style="margin:0">NIK-KTP <span style="background:red; color:#fff; padding:0 5px;">PRO</span></h1>
            <p style="margin:5px 0 0 0">Validation & Local Intelligence Tools</p>
        </header>

        <section class="card">
            <h3>🔍 Validasi & Cari Data</h3>
            <div class="input-group">
                <input type="text" id="queryInput" placeholder="Masukkan 16 Digit NIK...">
                <button onclick="execute()">RUN</button>
            </div>
            <div id="result">Menunggu perintah...</div>
        </section>

        <section class="card">
            <h3>📁 Batch Processing (.txt)</h3>
            <input type="file" id="fileInput">
            <button class="btn-batch" onclick="processBatch()">START BATCH & EXPORT</button>
        </section>
    </div>

    <script>
        async function execute() {
            const query = document.getElementById('queryInput').value;
            const resDiv = document.getElementById('result');
            resDiv.innerHTML = "Processing...";

            const response = await fetch('/api/execute', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ query })
            });
            const data = await response.json();

            let html = "";
            if(data.parse.valid) {
                const p = data.parse.data;
                html += `<div class="box success">
                    <b>PARSE RESULT:</b><br>
                    NIK: ${p.nik}<br>Gender: ${p.gender}<br>Lahir: ${p.lahir}<br>Wilayah: ${p.wilayah}
                </div>`;
            } else {
                html += `<div style="color:red">❌ ${data.parse.message}</div>`;
            }

            if(data.database) {
                html += `<div class="box info">
                    <b>DATABASE MATCH:</b><br>
                    Nama: ${data.database.nama}<br>Alamat: ${data.database.alamat}
                </div>`;
            }
            resDiv.innerHTML = html || "Data tidak ditemukan.";
        }

        async function processBatch() {
            const fileInput = document.getElementById('fileInput');
            if(!fileInput.files[0]) return alert("Pilih file .txt dulu!");

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            const resDiv = document.getElementById('result');
            resDiv.innerHTML = "Processing Batch... Mohon tunggu.";

            const response = await fetch('/api/batch', { method: 'POST', body: formData });
            const data = await response.json();

            if(data.fileUrl) {
                resDiv.innerHTML = `
                <div class="box success">
                    ✅ Berhasil: ${data.count} Data<br>
                    <a href="${data.fileUrl}" style="font-weight:bold; color:blue;">[ KLIK DOWNLOAD CSV ]</a>
                </div>`;
            } else {
                resDiv.innerHTML = `<div style="color:red">❌ Error: ${data.message}</div>`;
            }
        }
    </script>
</body>
</html>
